<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Fractions!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px) rotate(-5deg); }
            75% { transform: translateX(15px) rotate(5deg); }
        }
        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 4s linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
        .confetti {
            position: absolute;
            top: -50px;
            animation: fall linear forwards;
        }
        /* Hide all screens by default */
        .screen { display: none; }
        .screen.active { display: flex; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-cyan-100 via-sky-50 to-blue-200 font-sans flex flex-col relative overflow-hidden select-none text-gray-900">

    <!-- Global Header -->
    <div id="global-header" class="absolute top-0 w-full p-4 flex justify-between items-center z-20 hidden">
        <button onclick="showScreen('home')" class="bg-white hover:bg-gray-100 p-3 rounded-full shadow-md text-blue-500 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </button>
        <div id="progress-stars" class="hidden gap-2 bg-white/50 backdrop-blur-md px-4 py-2 rounded-full flex">
            <!-- Stars injected via JS -->
        </div>
    </div>

    <!-- HOME SCREEN -->
    <div id="screen-home" class="screen active flex-col items-center justify-center flex-1 space-y-12 p-4">
        <div class="relative animate-float pt-10">
            <div id="home-pizza"></div>
            <div class="absolute -bottom-4 -right-4 bg-yellow-400 rounded-full p-4 shadow-xl border-4 border-white rotate-12">
                <span class="text-4xl md:text-5xl">🍕</span>
            </div>
        </div>
        
        <div class="text-center space-y-4">
            <h1 class="text-6xl md:text-8xl font-black text-blue-900 tracking-tight drop-shadow-md">
                Pizza Fractions!
            </h1>
            <p class="text-2xl md:text-3xl text-blue-700 font-bold bg-white/40 inline-block px-6 py-2 rounded-full">
                Learn to share with your friends!
            </p>
        </div>

        <div class="flex flex-col md:flex-row gap-6 w-full max-w-2xl px-4">
            <button onclick="startLearn()" class="flex-1 flex items-center justify-center gap-3 bg-emerald-400 hover:bg-emerald-500 text-white text-3xl font-black py-6 px-8 rounded-full shadow-lg border-b-8 border-emerald-600 active:border-b-0 active:translate-y-2 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Learn
            </button>
            <button onclick="startPlay()" class="flex-1 flex items-center justify-center gap-3 bg-rose-400 hover:bg-rose-500 text-white text-3xl font-black py-6 px-8 rounded-full shadow-lg border-b-8 border-rose-600 active:border-b-0 active:translate-y-2 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="white" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                Play
            </button>
        </div>
    </div>

    <!-- LEARN SCREEN -->
    <div id="screen-learn" class="screen flex-col items-center justify-center flex-1 p-4 max-w-4xl mx-auto w-full pt-20">
        <div class="bg-white/80 backdrop-blur-md rounded-[3rem] shadow-2xl border-8 border-white p-8 md:p-12 w-full text-center flex flex-col items-center space-y-8 animate-in fade-in zoom-in duration-300">
            <div class="flex items-center justify-center gap-4 w-full">
                <h2 id="learn-title" class="text-4xl md:text-6xl font-black text-blue-900 drop-shadow-sm"></h2>
                <button onclick="playLearnVoice()" class="bg-blue-100 hover:bg-blue-200 p-4 rounded-full text-blue-600 transition-colors shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                </button>
            </div>
            <div id="learn-visual" class="h-64 flex items-center justify-center py-4"></div>
            <p id="learn-text" class="text-2xl md:text-3xl text-gray-700 font-bold max-w-2xl"></p>
        </div>

        <div class="flex justify-between w-full mt-10 px-4 md:px-12">
            <button id="learn-back-btn" onclick="prevLearn()" class="flex items-center gap-2 text-2xl font-bold py-4 px-8 rounded-full transition-all bg-gray-300 hover:bg-gray-400 text-gray-800 shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                Back
            </button>
            <button id="learn-next-btn" onclick="nextLearn()" class="flex items-center gap-2 bg-emerald-400 hover:bg-emerald-500 text-white text-2xl font-bold py-4 px-10 rounded-full shadow-lg border-b-8 border-emerald-600 active:border-b-0 active:translate-y-2 transition-all">
                Next 
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </button>
        </div>
    </div>

    <!-- PLAY SCREEN -->
    <div id="screen-play" class="screen flex-col items-center justify-center flex-1 p-4 pt-24 w-full">
        <!-- Yay Celebration Overlay -->
        <div id="yay-overlay" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-white/70 backdrop-blur-sm">
            <div class="text-7xl md:text-9xl font-black text-green-500 animate-bounce drop-shadow-xl flex flex-col items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-32 h-32 md:w-48 md:h-48 text-yellow-400 fill-yellow-400 mb-6 animate-spin-slow drop-shadow-lg" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                YAY!
            </div>
        </div>

        <div class="text-center space-y-12 max-w-5xl w-full">
            <div class="flex items-center justify-center gap-4 bg-white/60 backdrop-blur-md rounded-full py-4 px-8 inline-flex shadow-sm">
                <h2 id="play-question" class="text-4xl md:text-5xl font-black text-blue-900 drop-shadow-sm"></h2>
                <button onclick="playQuestionVoice()" class="bg-blue-200 hover:bg-blue-300 p-4 rounded-full text-blue-700 transition-colors shrink-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                </button>
            </div>

            <div id="play-options" class="flex flex-wrap justify-center gap-8 md:gap-16">
                <!-- Options injected via JS -->
            </div>
        </div>
    </div>

    <!-- WIN SCREEN -->
    <div id="screen-win" class="screen flex-col items-center justify-center flex-1 space-y-8 z-10 text-center p-4">
        <div id="confetti-container"></div>
        
        <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-40 h-40 text-rose-500 animate-bounce drop-shadow-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5.8 11.3 2 22l10.7-3.79"/><path d="M4 3h.01"/><path d="M22 8h.01"/><path d="M15 2h.01"/><path d="M22 20h.01"/><path d="m22 2-2.24.75a2.9 2.9 0 0 0-1.96 3.12v0c.1.86-.57 1.63-1.45 1.63h-.38c-.86 0-1.6.6-1.76 1.44L14 10"/><path d="m22 13-.82-.33c-.86-.34-1.82.2-1.98 1.11v0c-.11.7-.72 1.22-1.43 1.22H17"/><path d="m11 2 .33.82c.34.86-.2 1.82-1.11 1.98v0C9.52 4.9 9 5.52 9 6.23V7"/><path d="M11 13c1.93 1.93 2.83 4.17 2 5-.83.83-3.07-.07-5-2-1.93-1.93-2.83-4.17-2-5 .83-.83 3.07.07 5 2Z"/></svg>
            <svg class="absolute top-0 -right-10 w-16 h-16 text-yellow-400 fill-yellow-400 animate-spin-slow" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <svg class="absolute bottom-0 -left-10 w-12 h-12 text-yellow-400 fill-yellow-400 animate-float" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        
        <h1 class="text-6xl md:text-8xl font-black text-indigo-900 drop-shadow-md">You Did It!</h1>
        <p class="text-3xl md:text-4xl text-indigo-700 font-bold bg-white/50 px-8 py-3 rounded-full">
            You are a Fraction Master!
        </p>
        
        <div class="flex gap-4 my-8" id="win-stars">
            <!-- Win stars injected via JS -->
        </div>

        <button onclick="startHome()" class="flex items-center justify-center gap-3 bg-blue-500 hover:bg-blue-600 text-white text-3xl font-black py-6 px-12 rounded-full shadow-xl border-b-8 border-blue-700 active:border-b-0 active:translate-y-2 transition-all mt-8">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Play Again
        </button>
    </div>

    <!-- Application Script -->
    <script>
        // --- State Variables ---
        let step = 0;
        let currentQ = 0;
        let isCelebrating = false;

        // --- SVG Helpers ---
        const SVG_STAR = `<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
        
        function getPizzaPiece(type, className = "", onClick = "") {
            const clickAttr = onClick ? `onclick="${onClick}"` : '';
            const clickClasses = onClick ? 'cursor-pointer hover:scale-105 active:scale-95' : '';
            
            let parts = '';
            if (type === 'whole') {
                parts = `
                    <circle cx="50" cy="50" r="42" fill="#facc15" stroke="#b45309" stroke-width="3" />
                    <circle cx="35" cy="35" r="4.5" fill="#ef4444" />
                    <circle cx="65" cy="35" r="4.5" fill="#ef4444" />
                    <circle cx="50" cy="70" r="4.5" fill="#ef4444" />
                    <circle cx="30" cy="55" r="4.5" fill="#ef4444" />
                    <circle cx="70" cy="60" r="4.5" fill="#ef4444" />
                    <circle cx="50" cy="50" r="4.5" fill="#ef4444" />
                `;
            } else if (type === 'half') {
                parts = `
                    <path d="M 50 8 A 42 42 0 0 1 50 92 L 50 50 Z" fill="#facc15" stroke="#b45309" stroke-width="3" stroke-linejoin="round" />
                    <circle cx="70" cy="35" r="4.5" fill="#ef4444" />
                    <circle cx="65" cy="65" r="4.5" fill="#ef4444" />
                    <circle cx="80" cy="50" r="4.5" fill="#ef4444" />
                    <circle cx="60" cy="50" r="4.5" fill="#ef4444" />
                `;
            } else if (type === 'quarter') {
                parts = `
                    <path d="M 50 50 L 50 8 A 42 42 0 0 1 92 50 Z" fill="#facc15" stroke="#b45309" stroke-width="3" stroke-linejoin="round" />
                    <circle cx="70" cy="25" r="4.5" fill="#ef4444" />
                    <circle cx="65" cy="40" r="4.5" fill="#ef4444" />
                    <circle cx="80" cy="40" r="4.5" fill="#ef4444" />
                `;
            }

            return `
                <div ${clickAttr} class="transition-transform duration-200 ${clickClasses} ${className}">
                    <svg viewBox="0 0 100 100" class="w-full h-full drop-shadow-lg">
                        <circle cx="50" cy="50" r="46" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
                        <circle cx="50" cy="50" r="35" fill="none" stroke="#e2e8f0" stroke-width="1" />
                        ${parts}
                    </svg>
                </div>
            `;
        }

        // --- Data ---
        const LEARN_SLIDES = [
            {
                title: "This is a WHOLE pizza!",
                text: "It is one big piece. Perfect for a very hungry monster!",
                getVisual: () => getPizzaPiece('whole', 'w-56 h-56 md:w-64 md:h-64')
            },
            {
                title: "This is a HALF!",
                text: "Cut it down the middle! Now we have 2 equal pieces. Each piece is called a HALF.",
                getVisual: () => `
                    <div class="flex gap-4">
                        ${getPizzaPiece('half', 'w-40 h-40 md:w-48 md:h-48 -scale-x-100')}
                        ${getPizzaPiece('half', 'w-40 h-40 md:w-48 md:h-48')}
                    </div>
                `
            },
            {
                title: "These are QUARTERS!",
                text: "Cut it into 4 equal pieces! Each piece is called a QUARTER.",
                getVisual: () => `
                    <div class="grid grid-cols-2 gap-4 p-4">
                        ${getPizzaPiece('quarter', 'w-32 h-32 md:w-40 md:h-40 -rotate-90')}
                        ${getPizzaPiece('quarter', 'w-32 h-32 md:w-40 md:h-40')}
                        ${getPizzaPiece('quarter', 'w-32 h-32 md:w-40 md:h-40 rotate-180')}
                        ${getPizzaPiece('quarter', 'w-32 h-32 md:w-40 md:h-40 rotate-90')}
                    </div>
                `
            }
        ];

        const GAME_QUESTIONS = [
            { text: "Tap the WHOLE pizza!", answer: 'whole', options: ['half', 'whole', 'quarter'] },
            { text: "Can you find the HALF?", answer: 'half', options: ['quarter', 'whole', 'half'] },
            { text: "Which one is a QUARTER?", answer: 'quarter', options: ['whole', 'quarter', 'half'] },
            { text: "Let's find the WHOLE pizza again!", answer: 'whole', options: ['quarter', 'half', 'whole'] },
            { text: "Tap the HALF pizza!", answer: 'half', options: ['half', 'quarter', 'whole'] },
        ];

        // --- Logic & DOM Manipulation ---

        function playVoice(text) {
            try {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const msg = new SpeechSynthesisUtterance(text);
                    msg.rate = 0.9;
                    msg.pitch = 1.1;
                    
                    const voices = window.speechSynthesis.getVoices();
                    const goodVoice = voices.find(v => v.lang.includes('en-') && (v.name.includes('Female') || v.name.includes('Google') || v.name.includes('Samantha')));
                    if(goodVoice) msg.voice = goodVoice;

                    window.speechSynthesis.speak(msg);
                }
            } catch (e) {
                console.warn("Speech synthesis error", e);
            }
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screenId).classList.add('active');
            
            const header = document.getElementById('global-header');
            if (screenId === 'home' || screenId === 'win') {
                header.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
                
                const starsContainer = document.getElementById('progress-stars');
                if (screenId === 'play') {
                    starsContainer.classList.remove('hidden');
                    renderProgressStars();
                } else {
                    starsContainer.classList.add('hidden');
                }
            }
        }

        // Home
        document.getElementById('home-pizza').innerHTML = getPizzaPiece('whole', 'w-56 h-56 md:w-72 md:h-72');

        function startHome() {
            showScreen('home');
        }

        // Learn
        function startLearn() {
            step = 0;
            renderLearn();
            showScreen('learn');
        }

        function renderLearn() {
            const slide = LEARN_SLIDES[step];
            document.getElementById('learn-title').textContent = slide.title;
            document.getElementById('learn-text').textContent = slide.text;
            document.getElementById('learn-visual').innerHTML = slide.getVisual();
            
            const backBtn = document.getElementById('learn-back-btn');
            const nextBtn = document.getElementById('learn-next-btn');

            if (step === 0) {
                backBtn.classList.add('opacity-0', 'pointer-events-none');
            } else {
                backBtn.classList.remove('opacity-0', 'pointer-events-none');
            }

            if (step === LEARN_SLIDES.length - 1) {
                nextBtn.innerHTML = `Let's Play! <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;
            } else {
                nextBtn.innerHTML = `Next <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>`;
            }

            playLearnVoice();
        }

        function nextLearn() {
            if (step < LEARN_SLIDES.length - 1) {
                step++;
                renderLearn();
            } else {
                startPlay();
            }
        }

        function prevLearn() {
            if (step > 0) {
                step--;
                renderLearn();
            }
        }

        function playLearnVoice() {
            playVoice(LEARN_SLIDES[step].title + ". " + LEARN_SLIDES[step].text);
        }

        // Play
        function startPlay() {
            currentQ = 0;
            renderPlay();
            showScreen('play');
        }

        function renderProgressStars() {
            const container = document.getElementById('progress-stars');
            let html = '';
            for(let i=0; i < GAME_QUESTIONS.length; i++) {
                const colorClasses = i < currentQ ? 'text-yellow-400 fill-yellow-400' : 'text-gray-300';
                html += `<div class="w-8 h-8 transition-colors duration-500 ${colorClasses}">${SVG_STAR}</div>`;
            }
            container.innerHTML = html;
        }

        function renderPlay() {
            const q = GAME_QUESTIONS[currentQ];
            document.getElementById('play-question').textContent = q.text;
            
            const optionsContainer = document.getElementById('play-options');
            optionsContainer.innerHTML = q.options.map((opt, i) => `
                <div id="option-${i}" class="transform transition-all">
                    ${getPizzaPiece(opt, 'w-40 h-40 md:w-56 md:h-56', `handleOptionClick('${opt}', ${i})`)}
                </div>
            `).join('');

            renderProgressStars();
            playQuestionVoice();
        }

        function playQuestionVoice() {
            playVoice(GAME_QUESTIONS[currentQ].text);
        }

        function handleOptionClick(opt, index) {
            if (isCelebrating) return;

            if (opt === GAME_QUESTIONS[currentQ].answer) {
                isCelebrating = true;
                playVoice("Yay! Great job!");
                document.getElementById('yay-overlay').classList.remove('hidden');
                document.getElementById('yay-overlay').classList.add('flex');
                
                setTimeout(() => {
                    document.getElementById('yay-overlay').classList.add('hidden');
                    document.getElementById('yay-overlay').classList.remove('flex');
                    isCelebrating = false;
                    
                    if (currentQ < GAME_QUESTIONS.length - 1) {
                        currentQ++;
                        renderPlay();
                    } else {
                        showWin();
                    }
                }, 1800);
            } else {
                playVoice("Oops! Try again.");
                const el = document.getElementById('option-' + index);
                el.classList.add('animate-shake');
                setTimeout(() => el.classList.remove('animate-shake'), 500);
            }
        }

        // Win
        function showWin() {
            showScreen('win');
            playVoice("Hooray! You are a fraction master!");
            
            // Generate Confetti
            const container = document.getElementById('confetti-container');
            const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
            let confettiHtml = '<div class="fixed inset-0 pointer-events-none overflow-hidden z-0">';
            for(let i=0; i<40; i++) {
                const left = Math.random() * 100;
                const dur = Math.random() * 2 + 2;
                const delay = Math.random() * 1.5;
                const bg = colors[Math.floor(Math.random() * colors.length)];
                confettiHtml += `<div class="confetti w-4 h-4 rounded-sm shadow-sm" style="left: ${left}vw; animation-duration: ${dur}s; animation-delay: ${delay}s; background-color: ${bg};"></div>`;
            }
            confettiHtml += '</div>';
            container.innerHTML = confettiHtml;

            // Generate Stars
            const starsContainer = document.getElementById('win-stars');
            let starsHtml = '';
            for(let i=1; i<=5; i++) {
                starsHtml += `<div class="w-16 h-16 md:w-20 md:h-20 text-yellow-400 fill-yellow-400" style="animation: bounce 1s infinite; animation-delay: ${i * 0.15}s">${SVG_STAR}</div>`;
            }
            starsContainer.innerHTML = starsHtml;
        }
    </script>
</body>
</html>
